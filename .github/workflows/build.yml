on:
  push:
    branches:
      - main
  pull_request:

name: Build

env:
  API_TOKEN: ${{ secrets.API_TOKEN }}

jobs:
  build:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    defaults:
      run:
        shell: bash
    env:
      npm_config_script_shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 24

      - uses: actions/cache/restore@v4
        id: cache
        with:
          path: .cache
          key: ${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ${{ github.ref_name }}-
            main-

      - name: Read VS Code version
        id: vscode
        run: |
          version=$(jq -r '.engines.vscode | sub("^[\\^~]"; "")' lsp/vscode/package.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache VS Code download
        uses: actions/cache@v4
        with:
          path: lsp/vscode/.vscode-test
          key: vscode-test-${{ runner.os }}-${{ steps.vscode.outputs.version }}

      - name: Install and Build
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Test (with coverage)
        if: runner.os == 'Linux'
        run: pnpm coverage

      - name: Test (Windows, no coverage)
        if: runner.os == 'Windows'
        run: |
          pnpm test
          pnpm -C lsp/server test
          pnpm -C lsp/monaco test
          pnpm -C lsp/server build-dev
          pnpm -C lsp/vscode build-dev
          pnpm -C lsp/vscode test:e2e

      - name: Typecheck
        if: runner.os == 'Linux'
        run: |
          pnpm typecheck --max-errors 888

      - name: Prune stale cache entries
        run: pnpm clean:cache:prune

      - uses: actions/cache/save@v4
        with:
          path: .cache
          key: ${{ github.ref_name }}-${{ github.run_id }}

      - uses: actions/upload-artifact@v4
        if: runner.os == 'Linux'
        with:
          name: browser.js
          path: dist/browser.js

      - name: Upload coverage to Codecov
        if: runner.os == 'Linux'
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Coverage gate (100% statements/branches/functions/lines)
        if: runner.os == 'Linux'
        run: pnpm coverage:check

      - uses: actions/upload-artifact@v4
        if: always() && runner.os == 'Linux'
        with:
          name: coverage-final
          path: |
            coverage/coverage-final.json
            coverage/coverage-summary.json
            coverage/lcov.info

  self-test:
    name: Self-Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    defaults:
      run:
        shell: bash
    env:
      npm_config_script_shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 24

      - name: Install and Test
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          pnpm test:self

  build-docs:
    name: Build Docs
    runs-on: ubuntu-latest
    environment:
      name: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 24

      - name: Install and Build
        # `pnpm docs:build` includes `pnpm build`
        run: |
          pnpm install --frozen-lockfile
          pnpm docs:build
        env:
          API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
