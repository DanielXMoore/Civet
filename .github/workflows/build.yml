on:
  push:
    branches:
      - main
  pull_request:

name: Build

env:
  API_TOKEN: ${{ secrets.API_TOKEN }}

jobs:
  build:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    defaults:
      run:
        shell: bash
    env:
      npm_config_script_shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 24

      - name: Cache month bucket
        id: month
        run: echo "ym=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache/restore@v4
        id: cache
        with:
          path: .cache
          key: ${{ github.ref_name }}-${{ steps.month.outputs.ym }}
          restore-keys: |
            main-${{ steps.month.outputs.ym }}

      - name: Cache VS Code download
        uses: actions/cache@v4
        with:
          path: lsp/vscode/.vscode-test
          key: vscode-test-${{ runner.os }}-${{ hashFiles('lsp/vscode/package.json') }}
          restore-keys: |
            vscode-test-${{ runner.os }}-

      - name: Install and Build
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Test
        run: |
          pnpm test:coverage

      - name: Test LSP
        working-directory: lsp/vscode
        run: |
          pnpm test:coverage

      - name: Typecheck
        if: runner.os == 'Linux'
        run: |
          CIVET_TYPECHECK_MAX_ERRORS=3667 node_modules/.bin/civet scripts/typecheck.civet

      - uses: actions/cache/save@v4
        with:
          path: .cache
          key: ${{ github.ref_name }}-${{ steps.month.outputs.ym }}

      - uses: actions/upload-artifact@v4
        if: runner.os == 'Linux'
        with:
          name: browser.js
          path: dist/browser.js

      - name: Merge coverage
        if: runner.os == 'Linux'
        run: |
          # The merged lsp lcov is anchored at lsp/vscode and references three
          # path shapes:
          #   ../../source/...   shared root sources (e.g. source/ts-service/)
          #   ../server/...      lsp/server/ files
          #   <bare>             lsp/vscode/ files (no relative prefix at all)
          # Rewrite each to a workspace-rooted path before concatenating with
          # the root lcov so Codecov sees a single consistent file tree.
          sed -e 's|^SF:\.\./\.\./source/|SF:source/|' -e 's|^SF:\.\./server/|SF:lsp/server/|' -e 's|^SF:\.\./|SF:lsp/|' -e '/^SF:\(lsp\|source\)\//!s|^SF:|SF:lsp/vscode/|' lsp/vscode/coverage/lcov.info > coverage/lsp-lcov.info
          cat coverage/lcov.info coverage/lsp-lcov.info > coverage/combined-lcov.info

      - name: Upload coverage to Codecov
        if: runner.os == 'Linux'
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: coverage/combined-lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  self-test:
    name: Self-Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    defaults:
      run:
        shell: bash
    env:
      npm_config_script_shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 24

      - name: Install and Test
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          pnpm test:self

  build-docs:
    name: Build Docs
    runs-on: ubuntu-latest
    environment:
      name: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 24

      - name: Install and Build
        # `pnpm docs:build` includes `pnpm build`
        run: |
          pnpm install --frozen-lockfile
          pnpm docs:build
        env:
          API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
