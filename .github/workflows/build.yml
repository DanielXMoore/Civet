on:
  push:
    branches:
      - main
  pull_request:

name: Build

env:
  API_TOKEN: ${{ secrets.API_TOKEN }}

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 24

      - name: Cache month bucket
        id: month
        run: echo "ym=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache/restore@v4
        id: cache
        with:
          path: .cache
          key: ${{ github.ref_name }}-${{ steps.month.outputs.ym }}
          restore-keys: |
            main-${{ steps.month.outputs.ym }}

      - name: Cache VS Code download
        uses: actions/cache@v4
        with:
          path: ~/lsp/.vscode-test
          key: vscode-test-${{ runner.os }}-${{ hashFiles('lsp/package.json') }}
          restore-keys: |
            vscode-test-${{ runner.os }}-

      - name: Install and Build
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Test
        run: |
          pnpm test:coverage

      - name: Test LSP
        working-directory: lsp
        run: |
          pnpm test:coverage

      - uses: actions/cache/save@v4
        with:
          path: .cache
          key: ${{ github.ref_name }}-${{ steps.month.outputs.ym }}

      - uses: actions/upload-artifact@v4
        with:
          name: browser.js
          path: dist/browser.js

      - name: Coveralls GitHub Action
        uses: coverallsapp/github-action@v2
        with:
          file: coverage/lcov.info

  self-test:
    name: Self-Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 24

      - name: Install and Test
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          pnpm test:self

  build-docs:
    name: Build Docs
    runs-on: ubuntu-latest
    environment:
      name: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 24

      - name: Install and Build
        # `pnpm docs:build` includes `pnpm build`
        run: |
          pnpm install --frozen-lockfile
          pnpm docs:build
        env:
          API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
