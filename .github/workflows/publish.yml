# Publishes when package.json has a version not yet on npm (see build/autorelease.sh).
#
# On npmjs.com → package → Settings → Trusted publishing: add GitHub Actions and set the
# workflow filename to publish.yml (must match this file exactly). Repository in package.json
# must match this GitHub repo.
#
# Requires npm CLI ≥ 11.5.1 and Node ≥ 22.14 (per npm trusted publishing docs).
#
# Runs after the "Build" workflow completes successfully on a push to main (not on PR builds).

name: Publish

on:
  workflow_run:
    workflows: [Build]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # workflow_run events can arrive for an older successful Build after main has already advanced.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_sha == github.sha
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          fetch-tags: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - run: bash build/autorelease.sh . lsp/server

      - name: Publish VS Code Extension
        working-directory: lsp/vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: bash build/autorelease.sh
